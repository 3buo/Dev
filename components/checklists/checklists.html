<div id="view-checklists">
    <div class="container">
        <h2>Nuevo Check-list</h2>
        <div class="input-group">
            <input type="text" id="clTitle" placeholder="Nombre de la nueva lista (Ej: Mercado, Proyecto X)">
            <button onclick="createChecklist()">Crear Lista</button>
        </div>
    </div>
    
    <div id="checklistsContainer"></div>

    <div id="editClModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; align-items: center; justify-content: center; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(5px);">
        <div class="container" style="max-width: 450px; width: 90%; background: #1e1e1e; border: 1px solid var(--secondary); max-height: 85vh; overflow-y: auto; display: flex; flex-direction: column;">
            <h2 style="color: var(--primary); margin-top: 0;">Editar Check-list</h2>
            
            <input type="hidden" id="editClIndex">
            
            <label style="font-size: 0.85em; color: #aaa; margin-bottom: 5px;">Título de la lista:</label>
            <input type="text" id="editClTitle" placeholder="Título" style="width: 100%; margin-bottom: 20px; box-sizing: border-box; font-size: 1.1em; font-weight: bold; color: var(--secondary);">
            
            <h3 style="font-size: 1em; color: #ccc; border-bottom: 1px solid #333; padding-bottom: 5px;">Elementos:</h3>
            
            <div id="editClItems" style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px;"></div>
            
            <label style="font-size: 0.85em; color: var(--primary); margin-bottom: 5px;">Añadir Nuevo Elemento:</label>
            <div class="input-group" style="margin-bottom: 25px;">
                <input type="text" id="editClNewItem" placeholder="Escribe y presiona Añadir..." onkeypress="if(event.key === 'Enter') addEditClItem()">
                <button onclick="addEditClItem()" style="background: rgba(3, 218, 198, 0.2); color: var(--secondary); border: 1px solid var(--secondary);">+ Añadir</button>
            </div>

            <button onclick="saveEditChecklist()" style="width: 100%; margin-bottom: 10px; font-size: 1.1em;">Guardar Cambios</button>
            <button onclick="closeEditClModal()" style="width: 100%; background: transparent; color: #aaa; border: 1px solid #444;">Cancelar</button>
        </div>
    </div>
</div>
