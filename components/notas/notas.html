<div id="view-notas">
    
    <div class="container">
        <h2>Notas</h2>
        <div class="input-group" style="flex-direction: column; margin-top: 15px;">
            
            <div style="display: flex; gap: 10px; width: 100%; flex-wrap: wrap; align-items: center;">
                <input type="text" id="noteTitle" placeholder="Título de la nota" style="flex-grow: 1;">
                
                <div class="color-picker-wrapper" title="Elige el color de la nota">
                    <input type="color" id="noteColor" value="#bb86fc">
                </div>

                <select id="noteCategorySelect" style="width: auto; min-width: 150px;">
                    <option value="Sin clasificar">Sin clasificar</option>
                    </select>
            </div>
            
            <textarea id="noteContent" placeholder="Escribe tu información... usa [[Nombre de otra nota]] para conectar ideas."></textarea>
            <div id="newNotePreview" class="markdown-content live-preview-box"></div>
            <button type="button" onclick="addNote()" style="align-self: flex-start;">Guardar Nota</button>
        </div>
    </div>

    <div class="container">
        <h2 style="color: #bb86fc;">Clasificaciones</h2>
        <div class="input-group">
            <input type="text" id="newCategoryInput" placeholder="Nueva categoría (Ej. Trabajo, Ideas, Proyectos...)">
            <button onclick="addNoteCategory()" style="background-color: #bb86fc; color: black;">Añadir Categoría</button>
        </div>
    </div>

    <div class="container" style="background: transparent; box-shadow: none; padding: 0;">
        <h2 style="padding: 20px; background: var(--surface); border-radius: 8px; margin-bottom: 20px;">Mi Bóveda de Notas</h2>
        <div id="categoriesContainer">
            </div>
    </div>

</div>
</div>
