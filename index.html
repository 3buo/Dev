<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify</title>

    <!-- 🔥 PERFORMANCE -->
    <meta name="theme-color" content="#121212">
    <meta name="description" content="Captura ideas y tareas en segundos sin perder el flujo.">

    <!-- 🔥 PRELOAD -->
    <link rel="preload" href="global.css" as="style">

    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="components/devmode/devmode.css">
    <link rel="stylesheet" href="components/alarm/alarm.css">

    <!-- LIBS -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js" defer></script>

    <!-- 🔥 LOADER STYLE -->
    <style>
        #globalLoader {
            position: fixed;
            inset: 0;
            background: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999999;
            transition: opacity 0.3s ease;
        }

        .loader-dot {
            width: 10px;
            height: 10px;
            margin: 5px;
            border-radius: 50%;
            background: #bb86fc;
            animation: bounce 0.6s infinite alternate;
        }

        .loader-dot:nth-child(2) { animation-delay: 0.2s; }
        .loader-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            to { transform: translateY(-10px); }
        }
    </style>
</head>

<body>

<!-- 🔥 GLOBAL LOADER -->
<div id="globalLoader">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
</div>

<!-- 🔥 CMD -->
<div id="cmdOverlay" onclick="closeCmd(event)">
    <div class="cmd-box">
        <input type="text" id="cmdInput" class="cmd-input" placeholder="Escribe un comando..." autocomplete="off">
        <ul id="cmdResults" class="cmd-results"></ul>
    </div>
</div>

<!-- 🔐 AUTH -->
<div id="authScreen">
    <div class="auth-container">

        <h1 style="color: var(--primary); margin-top: 0;">
            Taskify ⚡
        </h1>

        <p style="color: #aaa; margin-bottom: 25px;">
            Captura sin fricción. Organiza sin esfuerzo.
        </p>

        <input type="email" id="authEmail" class="auth-input" placeholder="Correo electrónico" required autocomplete="email">
        <input type="password" id="authPassword" class="auth-input" placeholder="Contraseña" required autocomplete="current-password">

        <!-- 🔥 BOTÓN CON ESTADO -->
        <button class="auth-btn" id="loginBtn" onclick="handleLogin()">
            Iniciar Sesión
        </button>

        <button class="auth-btn auth-btn-sec" onclick="appRegister()">
            Crear Cuenta Nueva
        </button>

        <div class="auth-links" onclick="appResetPassword()">
            ¿Olvidaste tu contraseña?
        </div>

    </div>
</div>

<!-- 🧠 APP -->
<div id="mainApp" style="display: none;">

    <div id="mdToolbar">
        <button class="md-btn" onmousedown="applyMd(event, '**', '**')">B</button>
        <button class="md-btn" onmousedown="applyMd(event, '*', '*')">I</button>
        <button class="md-btn" onmousedown="applyMd(event, '- ', '')">Lista</button>
        <button class="md-btn" onmousedown="applyMd(event, '[[', ']]')">[[ ]]</button> 
        <button class="md-btn" onmousedown="applyMd(event, '### ', '')">H3</button>
        <button class="md-btn" onmousedown="applyMdTable(event)">📊</button>
    </div>

    <div class="tabs" id="tabContainer">
        <button class="tab-btn active" id="tab-actividades" onclick="switchTab('actividades')">📝</button>
        <button class="tab-btn" id="tab-checklists" onclick="switchTab('checklists')">☑️</button>
        <button class="tab-btn" id="tab-recordatorios" onclick="switchTab('recordatorios')">🔔</button>
        <button class="tab-btn" id="tab-finanzas" onclick="switchTab('finanzas')">🔒</button>
        <button class="tab-btn" id="tab-notas" onclick="switchTab('notas')">📓</button>
        <button class="tab-btn" onclick="appLogout()" style="flex-grow: 0;">🚪</button>
    </div>

    <div id="tab-content-container"></div>
</div>

<!-- 🔊 BOTÓN FLOTANTE -->
<button class="alarm-floating-btn" onclick="window.toggleAlarmConfig()">🔊</button>

<!-- 🔥 LOGIN SCRIPT UX -->
<script>
function handleLogin() {
    const btn = document.getElementById("loginBtn");

    btn.disabled = true;
    btn.innerText = "Entrando...";

    window.appLogin();

    setTimeout(() => {
        btn.disabled = false;
        btn.innerText = "Iniciar Sesión";
    }, 2000);
}
</script>

<!-- 🔥 LOADER CONTROL -->
<script>
window.addEventListener("load", () => {
    const loader = document.getElementById("globalLoader");

    setTimeout(() => {
        loader.style.opacity = "0";
        setTimeout(() => loader.remove(), 300);
    }, 300);
});
</script>

<!-- APP -->
<script type="module" src="js/app.js"></script>

<script type="module">
    import { initDevMode } from './components/devmode/devmode.js';
    initDevMode();
</script>

<script type="module">
    import { initAlarmSystem } from './components/alarm/alarm.js';
    window.addEventListener('stateChanged', () => {
        initAlarmSystem();
    });
</script>

</body>
</html>
