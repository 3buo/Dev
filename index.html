<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta-Cognitive OS v17.6 (Modular Core)</title>
    <meta name="theme-color" content="#121212">
    <link rel="stylesheet" href="global.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>

    <div id="cmdOverlay" onclick="closeCmd(event)">
        <div class="cmd-box">
            <input type="text" id="cmdInput" class="cmd-input" placeholder="Escribe un comando..." autocomplete="off">
            <ul id="cmdResults" class="cmd-results"></ul>
        </div>
    </div>

    <div id="authScreen">
        <div class="auth-container">
            <h1 style="color: var(--primary); margin-top: 0;">Meta-OS <span style="font-size: 0.4em; color: #aaa;">Modular</span></h1>
            <p style="color: #aaa; margin-bottom: 25px;">Accede a tu instancia segura</p>
            <input type="email" id="authEmail" class="auth-input" placeholder="Correo electrónico" required>
            <input type="password" id="authPassword" class="auth-input" placeholder="Contraseña" required>
            <button class="auth-btn" onclick="appLogin()">Iniciar Sesión</button>
            <button class="auth-btn auth-btn-sec" onclick="appRegister()">Crear Cuenta Nueva</button>
            <div class="auth-links" onclick="appResetPassword()">¿Olvidaste tu contraseña?</div>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        
        <div id="mdToolbar">
            <button class="md-btn" onmousedown="applyMd(event, '**', '**')" title="Negrita">B</button>
            <button class="md-btn" onmousedown="applyMd(event, '*', '*')" title="Cursiva">I</button>
            <button class="md-btn" onmousedown="applyMd(event, '- ', '')" title="Lista">Lista</button>
            <button class="md-btn" onmousedown="applyMd(event, '[[', ']]')" title="Enlace Zettelkasten">[[ ]]</button> 
            <button class="md-btn" onmousedown="applyMd(event, '### ', '')" title="Título">H3</button>
            <button class="md-btn" onmousedown="applyMdTable(event)" style="color: var(--secondary);">📊 Tabla</button>
        </div>

        <div class="tabs" id="tabContainer">
            <button class="tab-btn active" id="tab-actividades" onclick="switchTab('actividades')">📝 Actividades</button>
            <button class="tab-btn" id="tab-checklists" onclick="switchTab('checklists')">☑️ Check-list</button>
            <button class="tab-btn" id="tab-recordatorios" onclick="switchTab('recordatorios')">🔔 Recordatorios</button>
            <button class="tab-btn" id="tab-finanzas" onclick="switchTab('finanzas')">🔒 Finanzas</button>
            <button class="tab-btn" id="tab-notas" onclick="switchTab('notas')">📓 Notas</button>
            <button class="tab-btn" onclick="appLogout()" style="flex-grow: 0; background-color: #cf6679; color: black; font-weight: bold; border-radius: 8px 8px 0 0;">🚪</button>
        </div>

        <div id="tab-content-container"></div>

        <div id="alarmModal">
            <div class="modal-content">
                <h1 style="color: var(--secondary);">⏰ ¡Es Hora!</h1>
                <h2 id="alarmText" style="color: white; font-size: 1.5em; margin: 15px 0;">Recordatorio</h2>
                <div id="alarmTypeDesc" style="font-size: 0.9em; color: #aaa; margin-bottom: 25px;"></div>
                <div class="modal-buttons">
                    <button id="btnSnooze" style="background: var(--surface); color: white; border: 1px solid var(--secondary); font-size: 1.1em; padding: 12px 25px;">Posponer</button>
                    <button id="btnComplete" style="background: var(--secondary); font-size: 1.1em; padding: 12px 25px;">Completar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>

<script type="module">
        import { prepare, layout } from 'https://esm.sh/@chenglou/pretext@latest';

        console.log("🚀 Pretext activado: Optimizando cajas de texto en segundo plano.");

        const autoResizeTextarea = (textarea) => {
            // Evitar procesar si la caja está oculta en otra pestaña
            if (textarea.clientWidth === 0) return;

            // Tomamos el texto escrito, o un espacio en blanco si está vacío
            const text = textarea.value || textarea.placeholder || " ";
            const style = window.getComputedStyle(textarea);

            // Extraemos la fuente y los márgenes internos que definiste en tu CSS
            const font = `${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;
            const paddingX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
            const paddingY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);

            // Ancho matemático disponible para las letras
            const availableWidth = textarea.clientWidth - paddingX;

            // Altura de cada línea (Fallback matemático si el CSS dice 'normal')
            let lineHeight = parseFloat(style.lineHeight);
            if (isNaN(lineHeight)) lineHeight = parseFloat(style.fontSize) * 1.5;

            try {
                // 1. LA MAGIA: Pretext prepara y mide las letras usando la GPU
                const prepared = prepare(text, font);
                
                // 2. Calcula los saltos de línea sin congelar el navegador
                const result = layout(prepared, availableWidth, lineHeight);

                // 3. Aplicamos la altura matemática exacta al elemento HTML
                const finalHeight = Math.max(result.height + paddingY, 80); // 80px es tu min-height del CSS
                textarea.style.height = `${finalHeight}px`;
                textarea.style.overflowY = 'hidden'; // Escondemos el scroll porque ya no se necesita
            } catch (error) {
                // Fallback silencioso (si el CDN de Pretext falla, usa el método clásico del navegador)
                textarea.style.height = 'auto';
                textarea.style.height = (textarea.scrollHeight) + 'px';
            }
        };

        // Escucha global: Cada vez que escribes algo, en cualquier parte de la app
        document.addEventListener('input', (e) => {
            if (e.target.tagName.toLowerCase() === 'textarea') {
                autoResizeTextarea(e.target);
            }
        });

        // Escucha global: Cuando cambias de pestaña, ajusta los textos que ya estaban escritos
        window.addEventListener('stateChanged', () => {
            // Un pequeño retraso para asegurar que el HTML de la nueva pestaña ya cargó
            setTimeout(() => {
                document.querySelectorAll('textarea').forEach(autoResizeTextarea);
            }, 100);
        });
    </script>
