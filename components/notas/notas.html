<link rel="stylesheet" href="components/notas/notas.css">

<div class="notes-wrapper" id="view-notas">

    <div class="graph-container">
        <div class="graph-overlay">
            <h3 style="margin:0; font-size:1.1em; text-shadow: 0 2px 4px black;">🌌 Red de pensamiento</h3>
            <span style="font-size: 0.75em; color: #8b949e;" id="graphStats">0 conexiones neuronales</span>
        </div>
        <canvas id="mindGraph"></canvas>
    </div>

    <div id="timeCapsule" class="time-capsule" style="display: none;" onclick="openTimeCapsule()">
        <div style="font-size: 0.8em; color: #b392f0; font-weight: bold; margin-bottom: 5px;">⏳ Recuerdo desbloqueado</div>
        <div id="tcContent" style="color: white; font-style: italic; font-size: 0.95em;">"Cargando..."</div>
    </div>

    <div class="zen-editor">
        <input type="text" id="noteTitle" class="zen-input-title" placeholder="Título de la nota...">
        <textarea id="noteContent" class="zen-input-body" placeholder="Escribe aquí... Usa # para títulos, **negrita**, o ``` para código."></textarea>
        
        <div style="margin-bottom: 10px;">
            <button onclick="addMainTable()" class="table-btn">+ Añadir tabla Excel</button>
        </div>
        <div id="mainTablesContainer"></div>

        <div style="display: flex; justify-content: flex-end; margin-top: 15px;">
            <button class="btn-primary" onclick="saveNote()">Guardar nota</button>
        </div>
    </div>

    <div class="notes-grid" id="notesGrid">
        </div>

    <div id="noteModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div style="padding: 20px 20px 0 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 15px;">
                <input type="text" id="editNoteTitle" class="zen-input-title" style="margin: 0;" placeholder="Título">
                <button onclick="closeNoteModal()" style="background: transparent; border: none; color: #8b949e; font-size: 1.5em; cursor: pointer; line-height: 1;">✖</button>
            </div>
            
            <input type="hidden" id="editNoteId">
            
            <div class="modal-body-split">
                
                <div class="modal-pane">
                    <span style="font-size: 0.8em; color: var(--note-accent); font-weight: bold;">EDITOR MARKDOWN</span>
                    <textarea id="editNoteContent" class="zen-input-body" style="flex-grow: 1; min-height: 150px; background: #010409; padding: 10px; border-radius: 6px; border: 1px solid #30363d;" oninput="updateLivePreview()"></textarea>
                    
                    <div style="margin-top: 10px;">
                        <button onclick="addEditTable()" class="table-btn">+ Añadir tabla Excel</button>
                    </div>
                    <div id="editTablesContainer" style="margin-top: 10px; display: flex; flex-direction: column; gap: 15px;"></div>
                </div>

                <div class="modal-pane">
                    <span style="font-size: 0.8em; color: #8b949e; font-weight: bold;">VISTA PREVIA EN VIVO</span>
                    <div class="preview-box">
                        <div id="livePreviewMarkdown" class="md-content"></div>
                        <div id="livePreviewTables" style="margin-top: 15px;"></div>
                    </div>
                </div>

            </div>
            
            <div style="padding: 15px 20px; background: #0d1117; border-top: 1px solid #30363d; display: flex; justify-content: space-between;">
                <button onclick="deleteNote()" style="background: #da3633; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;">🗑️ Eliminar</button>
                <button onclick="updateNote()" class="btn-primary" style="margin: 0;">Guardar cambios</button>
            </div>
        </div>
    </div>

</div>
