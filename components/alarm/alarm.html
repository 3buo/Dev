<link rel="stylesheet" href="components/alarm/alarm.css">

<button class="alarm-floating-btn" onclick="window.toggleAlarmConfig()" title="Configurar sonido de alertas">
    🔊
</button>

<div id="alarmConfigPanel" class="alarm-config-panel">
    <h3>⚙️ Sonido de Alertas</h3>
    
    <div style="display: flex; flex-direction: column; gap: 5px;">
        <label>Tono de Aviso</label>
        <select id="alarmSoundSelect" class="alarm-select" onchange="window.previewAndSaveAlarmSettings()">
            <option value="digital">Reloj Digital</option>
            <option value="bell">Campanilla Suave</option>
            <option value="scifi">Notificación Sci-Fi</option>
        </select>
    </div>

    <div style="display: flex; flex-direction: column; gap: 5px;">
        <label>Volumen</label>
        <input type="range" id="alarmVolumeSlider" class="alarm-slider" min="0" max="1" step="0.1" value="0.5" onchange="window.previewAndSaveAlarmSettings()">
    </div>

    <button onclick="window.toggleAlarmConfig()" style="background: transparent; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 6px; cursor: pointer; margin-top: 5px;">Cerrar</button>
</div>

<div id="sysAlarmModal" class="alarm-overlay" style="display: none;">
    <div class="alarm-content">
        <h1 style="color: #b392f0; margin-top: 0;">⏰ ¡Es Hora!</h1>
        <h2 id="sysAlarmTitle" style="color: white; font-size: 1.5em; margin: 15px 0;">Recordatorio</h2>
        <div id="sysAlarmDesc" style="font-size: 1em; color: #aaa; margin-bottom: 25px;"></div>
        
        <div class="alarm-buttons">
            <button class="alarm-btn alarm-btn-outline" onclick="window.snoozeSystemAlarm()">Posponer 5m</button>
            <button class="alarm-btn alarm-btn-solid" onclick="window.completeSystemAlarm()">¡Entendido!</button>
        </div>
    </div>
</div>
