<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

            --bg: #121212; --surface: #1e1e1e; --primary: #bb86fc; --secondary: #03dac6;

        /* AUTH & CORE STYLES */
        #authScreen { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 80vh; text-align: center; } 
        .auth-container { background: var(--surface); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; max-width: 400px; width: 100%; box-sizing: border-box; } 
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }

        .auth-btn:hover { opacity: 0.9; } 
        .auth-btn-sec { background: transparent; color: var(--secondary); border: 1px solid var(--secondary); }

        #mainApp { display: none; }
        
        .tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; align-items: stretch; } 
        .tab-btn { flex-grow: 1; padding: 12px 5px; background: #2a2a2a; color: var(--text); border: none; border-radius: 8px 8px 0 0; cursor: grab; font-size: 0.95em; transition: background 0.3s; text-align: center; user-select: none; } 
        .tab-btn.active { background: var(--surface); color: var(--primary); border-bottom: 3px solid var(--primary); font-weight: bold; } 
        .sortable-ghost { opacity: 0.4; background-color: var(--primary) !important; color: black !important; } 
        .tab-content { display: none; } 
        .tab-content.active { display: block; }
        
        .container { background-color: var(--surface); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; position: relative; } 
        h2 { border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;} 
        .cloud-status { font-size: 0.5em; padding: 4px 8px; border-radius: 10px; background: #444; color: white; } 
        .cloud-syncing { background: var(--secondary); color: black; } 
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; width: 100%; align-items: center; } 
        input[type="text"], input[type="number"], input[type="password"], input[type="date"], input[type="datetime-local"], input[type="tel"], select, textarea { padding: 10px; border: 1px solid #444; background: #2c2c2c; color: white; border-radius: 4px; font-family: inherit; } 
        input[type="text"], input[type="number"], input[type="password"], input[type="tel"], textarea { flex-grow: 1; } 
        textarea { width: 100%; min-height: 80px; resize: vertical; } 
        button { padding: 10px 20px; background-color: var(--primary); color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; } 
        button:hover { opacity: 0.9; } 
        ul { list-style-type: none; padding: 0; } 
        li { background: #2a2a2a; margin-bottom: 10px; padding: 15px; border-radius: 4px; display: flex; align-items: center; gap: 15px; transition: all 0.3s ease; }
        
        .pending-list-style li { border: 1px solid rgba(255, 255, 255, 0.1); } 
        .completed-task { opacity: 0.5; background: #1a1a1a; border: none !important; } 
        .completed-task > .task-content > strong { text-decoration: line-through; } 
        .task-content { flex-grow: 1; } 
        .task-date { font-size: 0.85em; color: #aaa; } 
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 0.75em; font-weight: bold; color: #000; } 
        .pri-Alta { background-color: var(--warning); } .pri-Media { background-color: #f6a192; } .pri-Baja { background-color: var(--secondary); } 
        .snooze-badge { background-color: var(--secondary); } .rec-badge { background-color: #ff9800; color: #000; } 
        
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; } 
        .balance-card { background: #2a2a2a; padding: 20px; border-radius: 8px; text-align: center; border-top: 4px solid var(--primary); display: flex; flex-direction: column; justify-content: space-between; } 
        .bc-facebank { border-color: var(--c-facebank); } .bc-binance { border-color: var(--c-binance); } .bc-bs { border-color: var(--c-bs); } 
        .b-title { font-size: 0.9em; color: #aaa; text-transform: uppercase; letter-spacing: 1px; } 
        .b-amount { font-size: 1.8em; font-weight: bold; margin: 10px 0; } 
        .b-btn { background: #444; color: white; padding: 5px 10px; font-size: 0.8em; width: 100%; margin-top: 10px; } 
        .expense-item { border-left: 4px solid #fff; } .ex-facebank { border-left-color: var(--c-facebank); } .ex-binance { border-left-color: var(--c-binance); } .ex-bs { border-left-color: var(--c-bs); } 
        .expense-amount { font-size: 1.2em; font-weight: bold; color: var(--warning); } 
        .pomodoro { text-align: center; } #timer { font-size: 3em; font-weight: bold; margin: 10px 0; color: var(--primary); }
        
        #alarmModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(5px); } 
        .modal-content { background: var(--surface); padding: 40px; border-radius: 12px; text-align: center; border: 2px solid var(--secondary); box-shadow: 0 0 30px var(--glow-color); max-width: 90%; width: 400px;} 
        .modal-buttons { margin-top: 30px; display: flex; gap: 15px; justify-content: center; }
        
        .note-header { display: flex; justify-content: space-between; align-items: center; width: 100%; cursor: pointer; }

        .rate-card { background: #2a2a2a; padding: 10px; border-radius: 6px; flex-grow: 1; text-align: center; border-left: 3px solid var(--secondary); font-size: 0.9em; min-width: 120px; } 
        .rate-card strong { font-size: 1.4em; color: white; display: block; margin-top: 5px; }
        .checklist-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; padding: 8px; background: #222; border-radius: 4px; flex-direction: column;} 
        .checklist-item-row { display: flex; align-items: flex-start; gap: 10px; width: 100%; } 
        .checklist-item input[type="checkbox"] { margin-top: 4px; transform: scale(1.2); } 
        .item-timestamps { font-size: 0.7em; color: var(--secondary); margin-top: 5px; opacity: 0.8; width: 100%; text-align: right;}
        
        #mdToolbar { display: none; position: absolute; background: #2a2a2a; border: 1px solid var(--primary); border-radius: 6px; padding: 6px; box-shadow: 0 5px 15px rgba(0,0,0,0.8); z-index: 2000; gap: 5px; } 
        .md-btn { background: #444; color: white; border: none; padding: 5px 8px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 0.85em; } 
        .md-btn:hover { background: var(--primary); color: black; }
        .filter-bar { display: flex; gap: 10px; padding: 10px; background: #222; border-radius: 6px; font-size: 0.85em; flex-wrap: wrap; margin-bottom: 15px; align-items: center; } 
        .filter-bar label { display: flex; align-items: center; gap: 5px; color: #ccc; } 
        .filter-bar input[type="date"], .filter-bar select { padding: 5px; font-size: 0.9em; border: 1px solid #444; background: #333; color: white; border-radius: 4px; } 
        #bsEquiv { font-size: 0.85em; color: var(--secondary); opacity: 0.9; margin-bottom: 5px; line-height: 1.4; }
        
        .live-preview-box { display:none; padding:15px; border:1px dashed var(--secondary); border-radius:4px; margin-bottom:10px; background:#1a1a1a; width: 100%; box-sizing: border-box; } 
        .markdown-content table { width: 100%; border-collapse: collapse; margin-top: 5px; margin-bottom: 5px; background: #222; font-size: 0.9em; overflow-x: auto; display: block; white-space: nowrap; } 
        .markdown-content th, .markdown-content td { border: 1px solid #444; padding: 10px; text-align: left; } 
        .markdown-content th { background-color: #333; color: var(--secondary); font-weight: bold; text-transform: uppercase; font-size: 0.85em; } 
        .markdown-content tr:nth-child(even) { background-color: #2a2a2a; } 
        .table-editor-wrapper { position: relative; margin-bottom: 20px; background: #1a1a1a; padding: 10px; border-radius: 6px; border: 1px dashed #444; display: inline-block; width: 100%; box-sizing: border-box; overflow-x: auto;} 
        .table-controls { display: flex; gap: 5px; margin-bottom: 10px; background: #222; padding: 5px; border-radius: 4px;} 
        .t-btn { background: #444; color: white; border: none; padding: 3px 8px; border-radius: 3px; font-size: 0.8em; cursor: pointer; font-weight: bold;} 
        .t-btn:hover { background: var(--secondary); color: black; } 
        .t-btn-del { background: #cf6679; color: black; } 
        .t-btn-del:hover { background: #ff8a9c; } 
        .markdown-content td[contenteditable=true], .markdown-content th[contenteditable=true] { outline: none; transition: background 0.2s; cursor: text; min-width: 50px; } 
        .markdown-content td[contenteditable=true]:focus, .markdown-content th[contenteditable=true]:focus { background: rgba(3, 218, 198, 0.15); box-shadow: inset 0 0 0 2px var(--glow-color); }
        
        .vault-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(18, 18, 18, 0.95); z-index: 50; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 8px; backdrop-filter: blur(5px); } 
        .vault-hidden { display: none !important; } 
        #fab-mic { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background: var(--warning); color: white; font-size: 24px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(207, 102, 121, 0.5); cursor: pointer; z-index: 9000; transition: transform 0.2s; } 
        #fab-mic.recording { animation: pulse 1s infinite; background: #ff4757; } 
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); } } 
        .chart-container { width: 100%; max-width: 400px; margin: 0 auto 20px auto; background: #222; padding: 15px; border-radius: 8px; }

        #cmdOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; backdrop-filter: blur(4px); align-items: flex-start; justify-content: center; padding-top: 10vh; }
        .cmd-box { background: #1e1e1e; width: 90%; max-width: 600px; border-radius: 12px; border: 1px solid #444; box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden; }
        .cmd-input { width: 100%; background: transparent; border: none; padding: 20px; font-size: 1.2em; color: white; outline: none; border-bottom: 1px solid #333; }
        .cmd-results { list-style: none; padding: 0; margin: 0; max-height: 300px; overflow-y: auto; }
        .cmd-results li { padding: 15px 20px; border-bottom: 1px solid #2a2a2a; cursor: pointer; color: #aaa; transition: all 0.2s;}
        .cmd-results li:hover, .cmd-results li.active-cmd { background: var(--primary); color: black; font-weight: bold; }

        .safe-to-spend-box { background: linear-gradient(135deg, #1e1e1e 0%, #2a2a2a 100%); padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #4CAF50; margin-bottom: 20px; position: relative; overflow: hidden;}
        .safe-to-spend-box::before { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(76, 175, 80, 0.2), transparent); animation: sweep 3s infinite; }
        @keyframes sweep { 100% { left: 200%; } }
        .sts-title { color: #aaa; font-size: 0.9em; text-transform: uppercase; letter-spacing: 2px; }
        .sts-amount { font-size: 2.5em; font-weight: bold; color: #4CAF50; margin: 10px 0; }
        .sts-subtext { font-size: 0.8em; color: var(--warning); }

        .heatmap-container { display: flex; flex-direction: column; align-items: center; background: #222; padding: 15px; border-radius: 8px; margin-top: 15px;}
        .heatmap-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-top: 10px; }
        .heat-cell { width: 15px; height: 15px; background: #333; border-radius: 2px; }
        .heat-lvl-1 { background: #0e4429; } .heat-lvl-2 { background: #006d32; } .heat-lvl-3 { background: #26a641; } .heat-lvl-4 { background: #39d353; }

        .zk-link { color: var(--primary); font-weight: bold; cursor: pointer; text-decoration: underline; background: rgba(187, 134, 252, 0.1); padding: 2px 5px; border-radius: 4px;}
        .zk-link:hover { background: rgba(187, 134, 252, 0.3); }
        #networkGraph { width: 100%; height: 300px; background: #1a1a1a; border: 1px dashed #444; border-radius: 8px; margin-bottom: 15px; display: none;}

        .tooltip { position: relative; display: inline-block; cursor: pointer; color: var(--secondary); margin-left: 5px; font-weight: bold; font-size: 0.85em; background: rgba(3, 218, 198, 0.1); border-radius: 50%; width: 22px; height: 22px; text-align: center; line-height: 22px; }
        .tooltip .tooltiptext { visibility: hidden; width: 220px; background-color: #2a2a2a; color: #fff; text-align: left; border-radius: 6px; padding: 10px; position: absolute; z-index: 1000; bottom: 125%; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.3s; font-size: 0.85em; font-weight: normal; border: 1px solid var(--secondary); box-shadow: 0 5px 15px rgba(0,0,0,0.8); pointer-events: none;}
        .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }

        /* Voice dictation transcript box */
        .voice-transcript-box { position: fixed; bottom: 100px; right: 20px; background: var(--surface); border: 1px solid var(--secondary); border-radius: 8px; padding: 12px 16px; max-width: 300px; z-index: 9001; box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-size: 0.9em; color: var(--text); display: none; }
        .voice-transcript-box .voice-label { font-size: 0.75em; color: var(--secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="cmdOverlay" onclick="closeCmd(event)">
        <div class="cmd-box">
            <input type="text" id="cmdInput" class="cmd-input" placeholder="Escribe un comando... (Ej: 'gasto', 'nota', 'tema')" autocomplete="off">
            <ul id="cmdResults" class="cmd-results"></ul>
        </div>
    </div>

    <div id="authScreen">
        <div class="auth-container">
            <h1 style="color: var(--primary); margin-top: 0;">Meta-OS <span style="font-size: 0.4em; color: #aaa;">v17.4</span></h1>
            <p style="color: #aaa; margin-bottom: 25px;">Accede a tu instancia segura</p>
            <input type="email" id="authEmail" class="auth-input" placeholder="Correo electrónico" required>
            <input type="password" id="authPassword" class="auth-input" placeholder="Contraseña" required>
            <button class="auth-btn" onclick="appLogin()">Iniciar Sesión</button>
            <button class="auth-btn auth-btn-sec" onclick="appRegister()">Crear Cuenta Nueva</button>
            <div class="auth-links" onclick="appResetPassword()">¿Olvidaste tu contraseña? (Recuperar)</div>
        </div>
    </div>

    <div id="mainApp">
        <div id="fab-mic" onclick="toggleVoiceNLP()" title="Dictado Inteligente">🎙️</div>
        <div id="voiceTranscript" class="voice-transcript-box">
            <div class="voice-label">🎙️ Escuchando...</div>
            <div id="voiceText">---</div>
        </div>

        <div id="mdToolbar">
            <button class="md-btn" onmousedown="applyMd(event, '**', '**')" title="Negrita">B</button>
            <button class="md-btn" onmousedown="applyMd(event, '*', '*')" title="Cursiva">I</button>
            <button class="md-btn" onmousedown="applyMd(event, '- ', '')" title="Lista">Lista</button>
            <button class="md-btn" onmousedown="applyMd(event, '[[', ']]')" title="Enlace Zettelkasten">[[ ]]</button> 
            <button class="md-btn" onmousedown="applyMd(event, '### ', '')" title="Título">H3</button>
            <button class="md-btn" onmousedown="applyMdTable(event)" title="Insertar Tabla" style="color: var(--secondary);">📊 Tabla</button>
        </div>

        <div class="tabs" id="tabContainer">
            <button class="tab-btn active" id="tab-actividades" onclick="switchTab('actividades')">📝 Actividades</button>
            <button class="tab-btn" id="tab-checklists" onclick="switchTab('checklists')">☑️ Check-list</button>
            <button class="tab-btn" id="tab-recordatorios" onclick="switchTab('recordatorios')">🔔 Recordatorios</button>
            <button class="tab-btn" id="tab-finanzas" onclick="switchTab('finanzas')">🔒 Finanzas</button>
            <button class="tab-btn" id="tab-notas" onclick="switchTab('notas')">📓 Notas</button>
            <button class="tab-btn" onclick="appLogout()" style="flex-grow: 0; background-color: #cf6679; color: black; font-weight: bold; border-radius: 8px 8px 0 0;">🚪</button>
        </div>

        <div id="actividades" class="tab-content active">Cargando...</div>
        <div id="checklists" class="tab-content">Cargando...</div>
        <div id="recordatorios" class="tab-content">Cargando...</div>
        <div id="finanzas" class="tab-content">Cargando...</div>
        <div id="notas" class="tab-content">Cargando...</div>

        <div id="alarmModal">
            <div class="modal-content">
                <h1 style="color: var(--secondary);">⏰ ¡Es Hora!</h1>
                <h2 id="alarmText" style="color: white; font-size: 1.5em; margin: 15px 0;">Recordatorio</h2>
                <div id="alarmTypeDesc" style="font-size: 0.9em; color: #aaa; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px;"></div>
                <div class="modal-buttons">
                    <button id="btnSnooze" style="background: var(--surface); color: white; border: 1px solid var(--secondary); font-size: 1.1em; padding: 12px 25px;">Posponer</button>
                    <button id="btnComplete" style="background: var(--secondary); font-size: 1.1em; padding: 12px 25px;">Completar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBa-d5nGmHqiJV0Es9LgT1S3gW4iFRBpyw", 
            authDomain: "activities-app-web.firebaseapp.com", 
            projectId: "activities-app-web", 
            storageBucket: "activities-app-web.firebasestorage.app", 
            messagingSenderId: "494543385836", 
            appId: "1:494543385836:web:8774fd9e43948de535e1c9" 
        };
        
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app); 
        const auth = getAuth(app); 

        // --- FUNCIÓN DE CARGA MODULAR (NUEVA) ---
        async function loadTabComponents() {
            const tabs = ['actividades', 'checklists', 'recordatorios', 'finanzas', 'notas'];
            for (const tab of tabs) {
                try {
                    const res = await fetch(`${tab}.html`);
                    if (res.ok) {
                        document.getElementById(tab).innerHTML = await res.text();
                    }
                } catch (e) {
                    console.error(`Error cargando el componente ${tab}. Usa un servidor local (CORS).`, e);
                }
            }
        }
        // ------------------------------------------

        window.parseMarkdown = (text) => {
            if (!text) return "";
            let processed = text.replace(/\[\[(.*?)\]\]/g, '<span class="zk-link" onclick="window.searchAndOpenNote(\'$1\')">#$1</span>');
            return marked.parse(processed);
        };

        let currentUid = null; 
        let unsubSnapshot = null;
        let masterPin = "1234";
        let tasks = [], reminders = [], balances = { facebank: 0, binance: 0, bs: 0 }, expenses = [], notes = [], recurringTasks = [], checklists = [], tabOrder = [], activityLog = {};
        window.tempChecklistItems = []; window.rateBcvVal = 0; window.rateBinanceVal = 0; window.rateEuroVal = 0; 
        
        let financeChartInstance = null;
        
        window.activeAlarm = null; 
        window.alarmAudioInterval = null; 
        let audioCtx = null;
        
        window.openChecklists = new Set(); let activeTextarea = null; 

        let voiceRecognition = null;
        let isRecording = false;

        function initVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.");
                return null;
            }
            const recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.interimResults = true;
            recognition.continuous = true;
            recognition.maxAlternatives = 1;

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }
                
                const voiceTextEl = document.getElementById('voiceText');
                const voiceBox = document.getElementById('voiceTranscript');
                
                if (interimTranscript) {
                    voiceTextEl.innerText = interimTranscript;
                    voiceBox.style.display = 'block';
                }

                if (finalTranscript) {
                    voiceTextEl.innerText = finalTranscript;
                    processVoiceCommand(finalTranscript.trim());
                }
            };

            recognition.onerror = (event) => {
                console.error('Voice error:', event.error);
                if (event.error === 'not-allowed') {
                    alert("Permiso de micrófono denegado. Habilítalo en la configuración del navegador.");
                }
                stopVoiceRecording();
            };

            recognition.onend = () => {
                if (isRecording) {
                    try { recognition.start(); } catch(e) {}
                }
            };

            return recognition;
        }

        function processVoiceCommand(text) {
            const lower = text.toLowerCase();
            
            if (lower.startsWith('tarea ') || lower.startsWith('actividad ') || lower.startsWith('agregar tarea ')) {
                const taskText = text.replace(/^(tarea|actividad|agregar tarea)\s+/i, '');
                tasks.push({ text: taskText, date: new Date().toISOString().split('T')[0], priority: 'Media', completed: false });
                recordActivity(); saveDataToCloud();
                showVoiceFeedback('✅ Tarea agregada: ' + taskText);
            } else if (lower.startsWith('nota ') || lower.startsWith('agregar nota ')) {
                const noteText = text.replace(/^(nota|agregar nota)\s+/i, '');
                notes.push({ title: 'Nota de Voz', content: noteText, date: new Date().toLocaleString('es-VE'), editedAt: null });
                recordActivity(); saveDataToCloud(); renderNotes();
                showVoiceFeedback('📓 Nota guardada: ' + noteText);
            } else if (lower.startsWith('recordatorio ') || lower.startsWith('recuérdame ')) {
                const remText = text.replace(/^(recordatorio|recuérdame)\s+/i, '');
                const futureDate = new Date(Date.now() + 3600000);
                const tzOffset = futureDate.getTimezoneOffset() * 60000;
                const localISO = new Date(futureDate.getTime() - tzOffset).toISOString().slice(0, 16);
                reminders.push({ text: remText, datetime: localISO, snoozeMins: 10, completed: false, notified: false });
                recordActivity(); saveDataToCloud(); renderReminders();
                showVoiceFeedback('🔔 Recordatorio en 1h: ' + remText);
            } else if (lower.startsWith('gasto ')) {
                const match = text.match(/gasto\s+([\d.,]+)\s+(?:en\s+)?(.+)/i);
                if (match) {
                    const amount = parseFloat(match[1].replace(',', '.'));
                    const desc = match[2].trim();
                    if (amount > 0) {
                        let account = 'facebank';
                        if (lower.includes('binance') || lower.includes('usdt')) account = 'binance';
                        else if (lower.includes('bolívar') || lower.includes('bolivar') || lower.includes(' bs')) account = 'bs';
                        
                        balances[account] -= amount;
                        const today = new Date().toLocaleString('es-VE');
                        expenses.push({ desc, amount, account, date: today, eqUsd: null, eqUsdt: null, eqEur: null });
                        recordActivity(); saveDataToCloud(); renderExpenses(); window.calculateSafeToSpend();
                        showVoiceFeedback(`💰 Gasto registrado: ${amount} en ${desc} (${account})`);
                    }
                } else {
                    showVoiceFeedback('No entendí el gasto. Di: "gasto 50 en comida"');
                }
            } else if (lower.includes('ir a actividades') || lower.includes('abrir actividades') || lower.includes('tareas')) {
                window.switchTab('actividades');
                showVoiceFeedback('📝 Navegando a Actividades');
            } else if (lower.includes('ir a notas') || lower.includes('abrir notas')) {
                window.switchTab('notas');
                showVoiceFeedback('📓 Navegando a Notas');
            } else if (lower.includes('ir a finanzas') || lower.includes('abrir finanzas')) {
                window.switchTab('finanzas');
                showVoiceFeedback('🔒 Navegando a Finanzas');
            } else if (lower.includes('iniciar pomodoro') || lower.includes('enfoque')) {
                window.switchTab('actividades');
                window.startTimer();
                showVoiceFeedback('⏰ Pomodoro iniciado');
            } else {
                tasks.push({ text: text, date: new Date().toISOString().split('T')[0], priority: 'Media', completed: false });
                recordActivity(); saveDataToCloud();
                showVoiceFeedback('📝 Tarea rápida: ' + text);
            }
        }

        function playBeep() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = "sine";
            osc.frequency.value = 800;
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function parseVeDate(dateStr) { 
            if(!dateStr) return new Date(0); 
            const parts = dateStr.split(',')[0].trim().split('/'); 
            if(parts.length === 3) { 
                return new Date(parts[2] + '-' + parts[1].padStart(2,'0') + '-' + parts[0].padStart(2,'0') + 'T00:00:00'); 
            } 
            return new Date(dateStr); 
        }

        function getLocalYMD(dateObj) {
            if (isNaN(dateObj)) return "";
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + d;
        }

        function recordActivity() {

        function renderHeatmap() { 
            const grid = document.getElementById('heatmapGrid'); 
            if(!grid) return; 
            grid.innerHTML = ''; 
            const today = new Date(); 
            for(let i = 29; i >= 0; i--) { 
                const d = new Date(today); 
                d.setDate(today.getDate() - i); 
                const dateStr = d.toISOString().split('T')[0]; 
                const count = activityLog[dateStr] || 0; 
                const cell = document.createElement('div'); 
                cell.className = 'heat-cell'; 
                if(count > 0 && count <= 2) cell.classList.add('heat-lvl-1'); 
                else if(count > 2 && count <= 5) cell.classList.add('heat-lvl-2'); 
                else if(count > 5 && count <= 8) cell.classList.add('heat-lvl-3'); 
                else if(count > 8) cell.classList.add('heat-lvl-4'); 
                cell.title = dateStr + ': ' + count + ' acciones'; 
                grid.appendChild(cell); 
            } 
        }

        function renderExpenses() { 
            const list = document.getElementById('expenseList'); 
            if (!list) return;
            list.innerHTML = ''; 
            
            const filterDateEl = document.getElementById('filterDate');
            const filterStartEl = document.getElementById('filterStartDate');
            const filterEndEl = document.getElementById('filterEndDate');
            const filterAccEl = document.getElementById('filterAccount');
            
            const fDate = filterDateEl ? filterDateEl.value : '';
            const fStart = filterStartEl ? filterStartEl.value : '';
            const fEnd = filterEndEl ? filterEndEl.value : '';
            const fAcc = filterAccEl ? filterAccEl.value : 'all';
            
            let filtered = expenses.map((exp, originalIndex) => ({...exp, originalIndex})); 
            
            if(fAcc !== 'all') filtered = filtered.filter(e => e.account === fAcc); 
            
            if(fDate) { 
                filtered = filtered.filter(e => getLocalYMD(parseVeDate(e.date)) === fDate); 
            } 
            else if (fStart && fEnd) { 
                filtered = filtered.filter(e => { 
                    const dYMD = getLocalYMD(parseVeDate(e.date)); 
                    return dYMD >= fStart && dYMD <= fEnd; 
                }); 
            } 
            
            [...filtered].reverse().forEach((exp) => { 
                const index = exp.originalIndex; 
                const li = document.createElement('li'); 
                li.className = 'expense-item ex-' + exp.account; 
                let symbol = exp.account === 'facebank' ? '$' : exp.account === 'binance' ? '₮' : 'Bs.'; 
                let equivHtml = ''; 
                if (exp.account === 'bs' && (exp.eqUsd || exp.eqUsdt || exp.eqEur)) { 
                    equivHtml = '<br><span style="font-size: 0.75em; color: var(--secondary); opacity: 0.9;">≈ $' + (exp.eqUsd||0).toFixed(2) + ' BCV | ₮' + (exp.eqUsdt||0).toFixed(2) + ' BIN | €' + (exp.eqEur||0).toFixed(2) + ' EUR</span>'; 
                } 
                const contentDiv = document.createElement('div'); 
                contentDiv.className = 'task-content'; 
                contentDiv.innerHTML = '<strong>' + exp.desc + '</strong><br><span class="task-date">📅 ' + exp.date + ' | 🏦 ' + exp.account.toUpperCase() + '</span>' + equivHtml; 
                const amountSpan = document.createElement('span'); 
                amountSpan.className = 'expense-amount'; 
                amountSpan.innerText = '-' + symbol + parseFloat(exp.amount).toFixed(2); 
                const deleteBtn = document.createElement('button'); 
                deleteBtn.innerText = 'Deshacer'; 
                deleteBtn.style.background = '#444'; deleteBtn.style.padding = '5px 10px'; deleteBtn.style.marginLeft = '15px'; deleteBtn.style.fontSize = '0.8em'; 
                deleteBtn.onclick = () => { 
                    if(confirm("¿Devolver gasto al saldo?")) { 
                        balances[exp.account] += parseFloat(exp.amount); 
                        expenses.splice(index, 1); 
                        saveDataToCloud(); renderExpenses(); window.calculateSafeToSpend(); 
                    } 
                }; 
                li.append(contentDiv, amountSpan, deleteBtn); 
                list.appendChild(li); 
            }); 
            if(filtered.length === 0) list.innerHTML = '<li style="justify-content:center; color:#aaa;">No hay gastos en este rango o cuenta.</li>'; 
            
            let sumFb = 0, sumBin = 0, sumBs = 0;

        window.calculateSafeToSpend = () => { 
            let ghostSubsSum = 0; 
            const subsMap = {}; 
            const thirtyDaysAgo = new Date(); 
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30); 
            expenses.forEach(e => { 
                const d = parseVeDate(e.date); 
                if(d >= thirtyDaysAgo) { 
                    const key = e.desc.toLowerCase().trim(); 
                    if(!subsMap[key]) subsMap[key] = { count: 0, amount: parseFloat(e.amount), account: e.account }; 
                    subsMap[key].count++; 
                } 
            }); 
            let subTexts = []; 
            for(let key in subsMap) { 
                if(subsMap[key].count > 1) { 
                    ghostSubsSum += subsMap[key].amount; 
                    subTexts.push(key + ' (' + subsMap[key].amount + ')'); 
                } 
            } 
            let totalUsdEquiv = balances.facebank + balances.binance; 
            if (window.rateBinanceVal > 0) totalUsdEquiv += (balances.bs / window.rateBinanceVal); 
            else if (window.rateBcvVal > 0) totalUsdEquiv += (balances.bs / window.rateBcvVal); 
            
            let safeToSpend = totalUsdEquiv - ghostSubsSum; 
            document.getElementById('stsValue').innerText = '≈ $' + safeToSpend.toFixed(2) + ' USD'; 
            if (subTexts.length > 0) { 
                document.getElementById('stsSubs').innerText = '👻 Peligro detectado: -' + ghostSubsSum + ' reservados para: ' + subTexts.join(', '); 
                document.getElementById('stsSubs').style.color = "var(--warning)"; 
            } else { 
                document.getElementById('stsSubs').innerText = '✅ No detecto suscripciones inminentes este mes.'; 
                document.getElementById('stsSubs').style.color = "#4CAF50"; 
            } 
        };

        window.addExpense = () => { 
            const desc = document.getElementById('expDesc').value;
            const amount = document.getElementById('expAmount').value;
            const account = document.getElementById('expAccount').value; 
            if (desc.trim() === '' || amount === '' || parseFloat(amount) <= 0 || account === '') return alert("Llena todos los campos."); 
            const numAmount = parseFloat(amount); 
            if (numAmount > balances[account] && !confirm('Gasto mayor al saldo. ¿Continuar?')) return; 
            balances[account] -= numAmount; 
            const today = new Date().toLocaleString('es-VE'); 
            let eqUsd = null, eqUsdt = null, eqEur = null; 
            if (account === 'bs') { 
                const bcv = window.rateBcvVal || 0; 
                const binance = window.rateBinanceVal || 0; 
                const euro = window.rateEuroVal || 0;
                if (bcv > 0) eqUsd = numAmount / bcv; 
                if (binance > 0) eqUsdt = numAmount / binance; 
                if (euro > 0) eqEur = numAmount / euro;
            }

                const li = document.createElement('li'); 
                li.style.flexDirection = 'column'; li.style.alignItems = 'flex-start'; 
                const header = document.createElement('div'); 
                header.className = 'note-header'; 
                let editMsg = note.editedAt ? '<span style="font-size: 0.7em; color: var(--secondary);">Editada: ' + note.editedAt + '</span>' : ''; 
                header.innerHTML = '<div style="flex-grow: 1;"><strong>' + note.title + '</strong><br><span class="task-date">📅 ' + note.date + '</span> <br> ' + editMsg + '</div><span style="font-size: 1.2em; color: var(--secondary);">▼</span>'; 
                const btnBox = document.createElement('div'); btnBox.style.display = 'flex'; btnBox.style.gap = '5px'; 
                const editBtn = document.createElement('button'); editBtn.innerText = '✏️'; editBtn.style.background = '#444'; editBtn.style.padding = '5px'; 
                const deleteBtn = document.createElement('button'); deleteBtn.innerText = 'X'; deleteBtn.style.background = '#cf6679'; deleteBtn.style.padding = '5px 10px'; 
                deleteBtn.onclick = (e) => { e.stopPropagation(); if(confirm("¿Borrar nota?")) { notes.splice(index, 1); saveDataToCloud(); renderNotes(); } }; 
                btnBox.append(editBtn, deleteBtn); header.appendChild(btnBox); 
                
                const body = document.createElement('div'); 
                body.className = 'note-body markdown-content'; 
                body.innerHTML = window.parseMarkdown(note.content); 
                
                const editArea = document.createElement('div'); 
                editArea.style.display = 'none'; editArea.style.width = '100%'; editArea.style.marginTop = '15px'; 
                const editTitle = document.createElement('input'); editTitle.type = 'text'; editTitle.value = note.title; editTitle.style.width = '100%'; editTitle.style.marginBottom = '10px'; 
                const editText = document.createElement('textarea'); editText.value = note.content; editText.style.width = '100%'; editText.style.minHeight = '150px'; 
                
                const editPreview = document.createElement('div'); editPreview.className = 'markdown-content live-preview-box'; 
                editText.addEventListener('input', () => window.renderLivePreview(editText, editPreview)); 
                const saveEditBtn = document.createElement('button'); saveEditBtn.innerText = 'Guardar'; saveEditBtn.style.marginTop = '15px'; 
                saveEditBtn.onclick = () => { 
                    if (editTitle.value.trim() === '' || editText.value.trim() === '') return alert("Vacío no."); 
                    notes[index].title = editTitle.value; notes[index].content = editText.value; notes[index].editedAt = new Date().toLocaleString('es-VE'); 
                    recordActivity(); saveDataToCloud(); renderNotes();
                }; 
                editArea.append(editTitle, editText, editPreview, saveEditBtn); 
                
                header.onclick = (e) => { 
                    if(e.target === editBtn) return; 
                    const isHidden = body.style.display === 'none' || body.style.display === ''; 
                    body.style.display = isHidden ? 'block' : 'none'; 
                    editArea.style.display = 'none'; 
                    header.querySelector('span').innerText = isHidden ? '▲' : '▼'; 
                }; 
                editBtn.onclick = (e) => { 
                    e.stopPropagation(); body.style.display = 'none'; editArea.style.display = 'block'; header.querySelector('span').innerText = '▲'; 
                    window.renderLivePreview(editText, editPreview); 
                }; 
                li.appendChild(header); li.appendChild(body); li.appendChild(editArea); list.appendChild(li); 
            }); 
        }

        window.searchAndOpenNote = (title) => { 
            switchTab('notas'); 
            setTimeout(() => {
                const noteElements = document.querySelectorAll('#notesList li'); 
                noteElements.forEach(li => { 
                    const strongEl = li.querySelector('strong');
                    if(strongEl && strongEl.textContent === title) { 
                        li.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
                        li.style.border = "2px solid var(--secondary)"; 
                        const body = li.querySelector('.note-body');
                        if (body) body.style.display = 'block';
                        setTimeout(() => li.style.border = "none", 2000); 
                    } 
                }); 
            }, 100);
        };

        window.toggleNotesGraph = () => { 
            const container = document.getElementById('networkGraph'); 
            if(container.style.display === 'block') { container.style.display = 'none'; return; } 
            container.style.display = 'block'; 
            let nodesArray = []; let edgesArray = []; 
            notes.forEach((n, idx) => { 
                nodesArray.push({ id: n.title, label: n.title, shape: 'dot', size: 15, color: '#bb86fc', font: {color: 'white'} }); 
                const matches = n.content.match(/\[\[(.*?)\]\]/g); 
                if(matches) { 
                    matches.forEach(match => { 
                        const target = match.replace('[[', '').replace(']]', ''); 
                        edgesArray.push({ from: n.title, to: target, color: '#03dac6', arrows: 'to' }); 
                    }); 
                } 
            }); 
            const data = { nodes: new vis.DataSet(nodesArray), edges: new vis.DataSet(edgesArray) }; 
            const options = { physics: { barnesHut: { gravitationalConstant: -2000 } } }; 
            new vis.Network(container, data, options); 
        };

        window.unlockVault = () => { 
            const input = document.getElementById('pinInput').value; 
            if (input === masterPin) { 
                document.getElementById('vaultOverlay').classList.add('vault-hidden'); 
                document.getElementById('vaultContent').classList.remove('vault-hidden'); 
                if(navigator.vibrate) navigator.vibrate([50, 50, 50]); renderExpenses(); window.calculateSafeToSpend(); 
            } else { 
                alert("PIN Incorrecto."); document.getElementById('pinInput').value = ''; 
                if(navigator.vibrate) navigator.vibrate(200); 
            } 
        };

        window.changePin = () => {
            const newPin = prompt("🔑 Ingresa tu nuevo PIN de seguridad (solo números preferiblemente):");
            if(newPin && newPin.trim().length > 0) {
                masterPin = newPin.trim();
                saveDataToCloud();
                alert("✅ PIN actualizado exitosamente.");
            }
        };

        Sortable.create(document.getElementById('tabContainer'), { animation: 150, ghostClass: 'sortable-ghost', onEnd: function () { tabOrder = Array.from(document.getElementById('tabContainer').children).map(btn => btn.id); saveDataToCloud(); } }); 

        window.exportToCSV = () => { 
            if(expenses.length === 0) return alert("Vacio."); 
            let csvContent = "Fecha,Descripcion,Metodo,Monto (Original),Equiv USD (BCV),Equiv USDT (Binance),Equiv EUR\n"; 
            const sorted = [...expenses].sort((a,b) => parseVeDate(a.date) - parseVeDate(b.date)); 
            sorted.forEach(e => { 
                const eqUsd = e.eqUsd ? e.eqUsd.toFixed(2) : "0.00";
                const eqUsdt = e.eqUsdt ? e.eqUsdt.toFixed(2) : "0.00";
                const eqEur = e.eqEur ? e.eqEur.toFixed(2) : "0.00";
                csvContent += ['"' + e.date + '"', '"' + e.desc + '"', '"' + e.account + '"', '"' + e.amount + '"', '"' + eqUsd + '"', '"' + eqUsdt + '"', '"' + eqEur + '"'].join(',') + "\n"; 
            }); 
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' }); 
            const link = document.createElement("a"); 
            link.setAttribute("href", URL.createObjectURL(blob)); 
            link.setAttribute("download", "Reporte_Finanzas_MetaOS.csv"); 
            link.style.visibility = 'hidden'; 
            document.body.appendChild(link); 
            link.click(); 
            document.body.removeChild(link); 
        };
    </script>
</body>
</html>
