<div id="view-actividades">
    
    <div class="container">
        <h2>Nueva Actividad <span id="syncStatus" class="cloud-status">Conectando...</span></h2>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="¿Qué necesitas lograr hoy?">
            <input type="date" id="dateInput">
            <select id="priorityInput">
                <option value="Alta">Alta</option>
                <option value="Media" selected>Media</option>
                <option value="Baja">Baja</option>
            </select>
            <button onclick="addTask()">Agregar</button>
        </div>
        <ul id="pendingList" class="pending-list-style"></ul>
    </div>

    <div class="container">
        <h2 class="title-habits">Hábitos y Rutinas <div class="tooltip">?<span class="tooltiptext">Si eliges días específicos, el hábito sonará siempre a la hora marcada. Si llegas tarde, el sistema recalculará en base a la hora original.</span></div></h2>
        
        <div class="input-group" style="flex-direction: column; align-items: flex-start; background: #0f1015; padding: 15px; border-radius: 8px; border: 1px dashed #2d3446;">
            <div style="display: flex; gap: 10px; width: 100%;">
                <input type="text" id="recTaskInput" placeholder="Nombre de la rutina (Ej: Gimnasio, Leer)" style="flex-grow: 1;">
                <input type="time" id="recTaskTime" title="Hora exacta de la alarma">
            </div>
            
            <div style="margin-top: 10px; width: 100%;">
                <span style="font-size: 0.85em; color: #8ba4b5; display: block; margin-bottom: 5px;">Selecciona los días (opcional):</span>
                <div class="day-checkboxes" id="recTaskDays">
                    <label><input type="checkbox" value="1"> L</label>
                    <label><input type="checkbox" value="2"> M</label>
                    <label><input type="checkbox" value="3"> X</label>
                    <label><input type="checkbox" value="4"> J</label>
                    <label><input type="checkbox" value="5"> V</label>
                    <label><input type="checkbox" value="6"> S</label>
                    <label><input type="checkbox" value="0"> D</label>
                </div>
            </div>

            <div style="display: flex; gap: 10px; align-items: center; width: 100%; margin-top: 15px; border-top: 1px solid #2d3446; padding-top: 15px;">
                <span style="font-size: 0.85em; color: #8ba4b5;">O usar intervalo clásico:</span>
                <input type="number" id="recTaskInterval" min="1" value="1" style="width: 60px;">
                <select id="recTaskFreq" style="width: 110px;">
                    <option value="minutos">Minutos</option>
                    <option value="horas" selected>Horas</option>
                    <option value="dias">Días</option>
                </select>
                <button onclick="addRecurringTask()" class="btn-habits" style="margin-left: auto;">Programar</button>
            </div>
        </div>

        <ul id="recurringList" class="pending-list-style" style="margin-top: 20px;"></ul>
    </div>

    <div class="container">
        <h2>Actividades Completadas</h2>
        <ul id="completedList"></ul>
    </div>

</div>
