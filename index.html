<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- POLÍTICA DE SEGURIDAD DE CONTENIDO (CSP) FINAL Y ROBUSTA -->
    <!-- Permite la carga de recursos locales y externos de confianza, incluyendo APIs y CDN -->
    <!-- Se recomienda que esta política sea también configurada como una cabecera HTTP en tu servidor para mayor seguridad -->
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; 
                   script-src 'self' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://esm.sh https://cdnjs.cloudflare.com; 
                   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
                   connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net https://unpkg.com https://cdnjs.cloudflare.com https://ve.dolarapi.com https://pydolarvenezuela-api.vercel.app https://api.pydolarvenezuela.com https://api.allorigins.win;
                   img-src 'self' data: https:;
                   font-src 'self' https://fonts.gstatic.com;">
    <title>Taskify</title>
    <meta name="theme-color" content="#121212">
    
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="components/devmode/devmode.css">
    <link rel="stylesheet" href="components/alarm/alarm.css"> 
    
    <!-- Librerías Externas -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    
    <!-- Librería de Saneamiento (Obligatorio cargar antes de app.js) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <!-- Google Fonts (Necesita permisos en style-src y font-src) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="cmdOverlay">
        <div class="cmd-box">
            <input type="text" id="cmdInput" class="cmd-input" placeholder="Escribe un comando..." autocomplete="off">
            <ul id="cmdResults" class="cmd-results"></ul>
        </div>
    </div>

    <div id="authScreen">
        <div class="auth-container">
            <h1 style="color: var(--primary); margin-top: 0;">Meta-OS <span style="font-size: 0.4em; color: #aaa;">Secure</span></h1>
            <p style="color: #aaa; margin-bottom: 25px;">Accede a tu instancia encriptada</p>
            
            <div id="authMessage" style="display: none; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.85em; text-align: center; transition: 0.3s;"></div>

            <input type="email" id="authEmail" class="auth-input" placeholder="Correo electrónico" required>
            
            <div style="position: relative; width: 100%; margin-bottom: 20px;">
                <input type="password" id="authPassword" class="auth-input" placeholder="Contraseña (mín. 6 caracteres)" style="margin-bottom: 0; padding-right: 40px; width: 100%; box-sizing: border-box;" required>
                <button type="button" id="togglePasswordVisibilityBtn" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: #aaa; cursor: pointer; font-size: 1.2em;">👁️</button>
            </div>

            <button id="btnLoginBtn" class="auth-btn">Iniciar Sesión</button>
            <button id="btnRegBtn" class="auth-btn auth-btn-sec">Crear Cuenta Nueva</button>
            <div class="auth-links" id="appResetPasswordLink">¿Olvidaste tu contraseña?</div>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        
        <div id="mdToolbar">
            <button class="md-btn" id="mdBoldBtn" title="Negrita">B</button>
            <button class="md-btn" id="mdItalicBtn" title="Cursiva">I</button>
            <button class="md-btn" id="mdListBtn" title="Lista">Lista</button>
            <button class="md-btn" id="mdLinkBtn" title="Enlace Zettelkasten">[[ ]]</button> 
            <button class="md-btn" id="mdH3Btn" title="Título">H3</button>
            <button class="md-btn" id="mdTableBtn" style="color: var(--secondary);">📊 Tabla</button>
        </div>

        <div class="tabs" id="tabContainer">
            <button class="tab-btn active" id="tab-actividades">📝 Actividades</button>
            <button class="tab-btn" id="tab-checklists">☑️ Check-list</button>
            <button class="tab-btn" id="tab-recordatorios">🔔 Recordatorios</button>
            <button class="tab-btn" id="tab-finanzas">🔒 Finanzas</button>
            <button class="tab-btn" id="tab-notas">📓 Notas</button>
            <button class="tab-btn" id="appLogoutBtn" style="flex-grow: 0; background-color: #cf6679; color: black; font-weight: bold; border-radius: 8px 8px 0 0;">🚪</button>
        </div>

        <div id="tab-content-container"></div>
        
    </div>

    <button id="alarmFloatingBtn" class="alarm-floating-btn" title="Configurar sonido de alertas">🔊</button>

    <div id="alarmConfigPanel" class="alarm-config-panel">
        <h3>⚙️ Sonido de Alertas</h3>
        
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label>Tono de Aviso</label>
            <select id="alarmSoundSelect" class="alarm-select">
                <option value="digital">Reloj Digital</option>
                <option value="bell">Campanilla Suave</option>
                <option value="scifi">Notificación Sci-Fi</option>
            </select>
        </div>

        <div style="display: flex; flex-direction: column; gap: 5px;">
            <label>Volumen</label>
            <input type="range" id="alarmVolumeSlider" class="alarm-slider" min="0" max="1" step="0.1" value="0.5">
        </div>

        <button id="closeAlarmConfigBtn" style="background: transparent; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 6px; cursor: pointer; margin-top: 5px;">Cerrar</button>
    </div>

    <div id="sysAlarmModal" class="alarm-overlay" style="display: none;">
        <div class="alarm-content">
            <h1 style="color: #b392f0; margin-top: 0;">⏰ ¡Es Hora!</h1>
            <h2 id="sysAlarmTitle" style="color: white; font-size: 1.5em; margin: 15px 0;">Recordatorio</h2>
            <div id="sysAlarmDesc" style="font-size: 1em; color: #aaa; margin-bottom: 25px;"></div>
            
            <div class="alarm-buttons">
                <button id="snoozeAlarmBtn" class="alarm-btn alarm-btn-outline">Posponer 5m</button>
                <button id="completeAlarmBtn" class="alarm-btn alarm-btn-solid">¡Entendido!</button>
            </div>
        </div>
    </div>


    <div id="devLoginModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999999; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; backdrop-filter: blur(10px);">
        <div style="background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #58a6ff; width: 300px; box-shadow: 0 0 50px rgba(88, 166, 255, 0.2);">
            <h2 style="color: #58a6ff; margin-top: 0; text-align: center;">⚡ Modo Developer</h2>
            <input type="text" id="devUser" placeholder="Usuario" style="width: 100%; margin-bottom: 15px; padding: 10px; background: #010409; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box;">
            <input type="password" id="devPass" placeholder="Contraseña" style="width: 100%; margin-bottom: 20px; padding: 10px; background: #010409; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box;">
            <div style="display: flex; gap: 10px;">
                <button id="devLoginBtn" style="flex: 1; background: #58a6ff; color: #000; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer;">Ingresar</button>
                <button id="devCancelLoginBtn" style="flex: 1; background: transparent; color: #8b949e; border: 1px solid #30363d; padding: 10px; border-radius: 6px; cursor: pointer;">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="devEditorPanel" class="dev-panel">
        <div class="dev-panel-header">
            <span>🛠️ UI Builder</span>
            <button id="btnInspectorToggle" style="background: transparent; border: 1px solid #58a6ff; color: #58a6ff; border-radius: 4px; cursor: pointer; padding: 4px 8px; font-size: 0.8em;">Inspeccionar: ON</button>
            <button id="closeDevPanelBtn" style="background: transparent; border: none; color: #8b949e; cursor: pointer; font-size: 1.2em;">✖</button>
        </div>
        
        <div class="dev-panel-body">
            <div style="font-size: 0.85em; color: #8b949e;">Editando Elemento:</div>
            <div id="devTargetSelector" class="dev-target-badge">Ninguno</div>

            <div class="dev-control-group dev-feature-box dev-feature-box-highlight" id="devTextGroup" style="display: none;">
                <label style="color: var(--note-accent);">📝 Texto del Elemento</label>
                <input type="text" id="devElementText" class="dev-input" placeholder="Sobreescribir texto original...">
            </div>

            <div class="dev-control-group">
                <label>Fondo (Background)</label>
                <div class="dev-color-wrapper">
                    <input type="color" id="devBgColor" class="dev-color-input">
                    <input type="text" id="devBgText" class="dev-input" style="flex: 1;" placeholder="#000000 o rgba()">
                </div>
            </div>

            <div class="dev-control-group">
                <label>Color de Texto</label>
                <div class="dev-color-wrapper">
                    <input type="color" id="devTextColor" class="dev-color-input">
                    <input type="text" id="devTextText" class="dev-input" style="flex: 1;">
                </div>
            </div>

            <div class="dev-control-group">
                <label>Color de Borde (Global)</label>
                <div class="dev-color-wrapper">
                    <input type="color" id="devBorderColor" class="dev-color-input">
                    <input type="text" id="devBorderText" class="dev-input" style="flex: 1;" placeholder="Ej: #ffffff">
                </div>
            </div>
            
            <div class="dev-control-group">
                <label>Línea Inferior</label>
                <input type="text" id="devBorderBottom" class="dev-input" placeholder="Ej: 3px solid #b392f0">
            </div>

            <div class="dev-control-group">
                <label>Radio de Borde (Border Radius)</label>
                <input type="text" id="devBorderRadius" class="dev-input" placeholder="Ej: 12px">
            </div>

            <div class="dev-control-group">
                <label>Relleno (Padding)</label>
                <input type="text" id="devPadding" class="dev-input" placeholder="Ej: 15px 20px">
            </div>
            
            <div class="dev-control-group">
                <label>Tamaño de Fuente (Font Size)</label>
                <input type="text" id="devFontSize" class="dev-input" placeholder="Ej: 1.2em o 16px">
            </div>

            <div id="devAnimGroup" class="dev-control-group dev-feature-box" style="display: none;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: white;">
                    <input type="checkbox" id="devAnimEnable">
                    ✨ Animación al hacer Clic
                </label>
                <select id="devAnimType" class="dev-input" style="display: none; margin-top: 10px; width: 100%; cursor: pointer;">
                    <option value="scale-down">Hundimiento Suave (Scale Down)</option>
                    <option value="scale-up">Salto 3D (Scale Up)</option>
                    <option value="pulse-glow">Resplandor Neón (Glow Pulse)</option>
                </select>
            </div>

            <button id="devBtnSave" class="dev-btn">💾 Guardar Cambios</button>
            <button id="devBtnReset" class="dev-btn dev-btn-danger">🔄 Revertir Elemento</button>
            <button id="devBtnFactoryReset" class="dev-btn dev-btn-danger" style="margin-top: 5px; border-style: dashed;">⚠️ Borrar TODO (CSS y Textos)</button>
        </div>
    </div>

    <!-- Scripts de Funcionalidad Base (Todos enlazados desde JS) -->
    <script type="module" src="js/app.js"></script>

    <script type="module">
        import { initDevMode } from './components/devmode/devmode.js';
        initDevMode();
    </script>

    <script type="module">
        import { initAlarmSystem } from './components/alarm/alarm.js';
        window.addEventListener('stateChanged', () => {
            initAlarmSystem();
        });
    </script>
</body>
</html>
