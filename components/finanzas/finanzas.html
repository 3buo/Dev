<div class="container" style="padding: 20px; background: transparent; box-shadow: none; position: relative; min-height: 60vh;">
    
    <div id="vaultOverlay" class="vault-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; border-radius: 12px;">
        <h1 style="color: var(--warning);">🔒 Bóveda Segura</h1>
        <p>Ingresa tu PIN Maestro para desencriptar</p>
        <div class="input-group" style="justify-content: center;">
            <input type="tel" id="pinInput" placeholder="****" style="-webkit-text-security: disc; text-align: center; width: 100px; font-size: 1.5em; letter-spacing: 5px;" maxlength="10" autocomplete="off">
            <button onclick="unlockVault()">Desbloquear</button>
        </div>
    </div>
    
    <div id="vaultContent" class="vault-hidden">
        
        <div style="display: flex; justify-content: flex-end; margin-bottom: 25px; gap: 10px;">
            <button type="button" onclick="openWalletModal()" style="background: rgba(3, 218, 198, 0.1); color: var(--secondary); border: 1px solid var(--secondary); font-size: 0.8em; padding: 5px 10px; border-radius: 4px; font-weight: bold;">➕ Añadir Cartera</button>
            <button type="button" onclick="changePin()" style="background: var(--surface); color: #aaa; border: 1px solid #444; font-size: 0.8em; padding: 5px 10px; border-radius: 4px;">🔑 Cambiar PIN</button>
        </div>

        <div id="walletModal" class="vault-hidden" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; display: flex; align-items: center; justify-content: center; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(5px);">
            <div class="auth-container" style="max-width: 350px; background: #1e1e1e; border: 1px solid var(--secondary);">
                <h2 style="color: var(--primary); margin-top: 0; border: none; justify-content: center;">Nueva Cartera</h2>
                <input type="text" id="newWalletName" placeholder="Nombre (Ej: Zinli, PayPal)" class="auth-input">
                <input type="text" id="newWalletSymbol" placeholder="Símbolo (Ej: $, €, Bs)" class="auth-input">
                
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; background: #222; padding: 10px; border-radius: 6px; border: 1px solid #444;">
                    <span style="color: #aaa; font-size: 0.9em;">Color de la etiqueta:</span>
                    <input type="color" id="newWalletColor" value="#ff0055" style="background: transparent; border: none; cursor: pointer; height: 35px; width: 50px; padding: 0;">
                </div>

                <button onclick="saveNewWallet()" style="width: 100%; margin-bottom: 10px;">Guardar Cartera</button>
                <button onclick="closeWalletModal()" style="width: 100%; background: transparent; color: #aaa; border: 1px solid #444;">Cancelar</button>
            </div>
        </div>

        <div id="walletsContainer" class="dashboard"></div>

        <div class="container" style="text-align: center; margin-top: 20px;">
            <h2>
                Distribución de Gastos 📊 
                <div style="display: flex; gap: 5px; margin-left: auto;">
                    <select id="chartSettingsType" onchange="window.renderExpenses()" style="font-size: 0.6em; padding: 3px; border-radius: 4px; background: #333; color: white; border: 1px solid #444; outline: none;">
                        <option value="bar">Barras 3D</option>
                        <option value="doughnut">Dona Simple</option>
                        <option value="pie">Torta</option>
                    </select>
                    <button type="button" onclick="downloadChartPNG()" style="font-size: 0.6em; padding: 5px 10px; background: var(--secondary); color: black;">⬇️ PNG</button>
                </div>
            </h2>
            <div class="chart-container">
                <canvas id="financeChart"></canvas>
            </div>
        </div>
        
        <div class="container">
            <h2>Tasas de cambio <button id="btnSyncRates" onclick="fetchExchangeRates()" style="font-size: 0.6em; padding: 5px 10px; margin-left: auto;">📡 Sincronizar</button></h2>
            <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: 10px;">
                <div class="rate-card">🇺🇸 BCV:<br><strong id="rateBcv">Bs. 0.00</strong></div>
                <div class="rate-card">🟡 Binance:<br><strong id="rateBinance">Bs. 0.00</strong></div>
                <div class="rate-card">🇪🇺 EUR:<br><strong id="rateEuro">Bs. 0.00</strong></div>
            </div>
            <div id="rateLastUpdate" style="font-size: 0.75em; color: #aaa; text-align: right; margin-top: 8px;">Esperando sincronización...</div>
        </div>
        
        <div class="container">
            <h2>Registrar Nuevo Gasto</h2>
            <div class="input-group">
                <input type="text" id="expDesc" placeholder="Detalle del gasto">
                <input type="number" id="expAmount" placeholder="Monto" step="0.01" min="0.01">
                <select id="expAccount"></select>
                <button onclick="addExpense()">Descontar</button>
            </div>
        </div>
        
        <div class="container">
            <h2>Historial <button type="button" onclick="exportToCSV()" style="font-size: 0.65em; padding: 6px 12px; background: var(--secondary); color: black; margin-left: auto;">📥 CSV</button></h2>
            <div class="filter-bar">
                <label style="width: 100%;">🔍 <input type="text" id="filterText" oninput="window.applyFilters()" placeholder="Buscar por detalle (Ej: Comida, Netflix...)" style="flex-grow: 1; padding: 8px;"></label>
                
                <label>📅 Día: <input type="date" id="filterDate" onchange="window.applyFilters()"></label>
                <label>🗓️ Rango: <input type="date" id="filterStartDate" onchange="window.applyFilters()"> <span>a</span> <input type="date" id="filterEndDate" onchange="window.applyFilters()"></label>
                <label>💵 
                    <select id="filterAccount" onchange="window.applyFilters()"></select>
                </label>
                <button type="button" onclick="window.clearFilters()" style="padding: 5px 10px; font-size: 0.9em; background: #cf6679; color: black; font-weight: bold; margin-left: auto;">✖ Limpiar</button>
            </div>
            <ul id="expenseList"></ul>
        </div>

    </div>
</div>
