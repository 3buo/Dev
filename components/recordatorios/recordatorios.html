<div class="container">
    <h2>Recordatorio rápido<div class="tooltip">?<span class="tooltiptext">Una alarma literal. Programa una hora exacta y tu navegador emitirá un sonido y una notificación en pantalla en ese momento.</span></div></h2>
    <div class="input-group">
        <input type="text" id="remInput" placeholder="¿Qué debo recordarte?">
        <input type="datetime-local" id="remDatetime">
        <select id="snoozeInput">
            <option value="5">5 min</option>
            <option value="10" selected>10 min</option>
            <option value="15">15 min</option>
            <option value="30">30 min</option>
        </select>
        <button onclick="addReminder()">Programar</button>
    </div>
</div>
<div class="container"><h2>Activos</h2><ul id="pendingReminders" class="pending-list-style"></ul></div>
<div class="container"><h2>Completados</h2><ul id="completedReminders"></ul></div>
